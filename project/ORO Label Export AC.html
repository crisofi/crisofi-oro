<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CRISOFI ORO — Label A & C Export</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garant:ital,wght@0,300;0,400;1,300;1,400&family=Cinzel:wght@400;500&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a1814; display: flex; flex-direction: column; align-items: center; gap: 60px; padding: 80px 60px; font-family: 'Cormorant Garant', serif; }
h1 { font-family: 'Cinzel', serif; font-size: 11px; letter-spacing: 0.4em; color: rgba(196,154,60,0.6); text-align: center; }
.pair { display: flex; gap: 60px; align-items: flex-start; justify-content: center; }
.card { display: flex; flex-direction: column; gap: 16px; align-items: center; }
.card-label { font-family: 'Cinzel', serif; font-size: 10px; letter-spacing: 0.3em; color: rgba(196,154,60,0.5); }

@media print {
  body { background: #fff; gap: 40px; padding: 40px; }
  .pair { gap: 40px; }
}
</style>
</head>
<body>
<h1>CRISOFI — ORO LABEL OPTIONS</h1>

<div class="pair">

  <!-- LABEL A: Classic Obsidian -->
  <div class="card">
    <div class="card-label">A · CLASSIC OBSIDIAN</div>
    <svg width="480" height="288" viewBox="0 0 480 288" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <style>
          @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garant:ital,wght@0,300;1,300&amp;family=Cinzel:wght@400&amp;display=swap');
        </style>
      </defs>
      <!-- Background -->
      <rect width="480" height="288" fill="#0d0c09" rx="3"/>
      <!-- Outer border -->
      <rect x="1" y="1" width="478" height="286" fill="none" stroke="rgba(196,154,60,0.4)" stroke-width="1" rx="2"/>
      <!-- Inner border -->
      <rect x="10" y="10" width="460" height="268" fill="none" stroke="rgba(196,154,60,0.15)" stroke-width="0.5" rx="1"/>

      <!-- CRISOFI -->
      <text x="240" y="60" text-anchor="middle" font-family="Cinzel, serif" font-size="13" fill="#b8a880" letter-spacing="8">CRISOFI</text>

      <!-- ORO -->
      <text x="240" y="168" text-anchor="middle" font-family="Cormorant Garant, serif" font-size="110" font-weight="300" fill="#e4d4aa">ORO</text>

      <!-- Rule -->
      <line x1="216" y1="186" x2="264" y2="186" stroke="rgba(196,154,60,0.55)" stroke-width="1"/>

      <!-- GOLDEN GOAT MILK SOAK -->
      <text x="240" y="214" text-anchor="middle" font-family="Cinzel, serif" font-size="10" fill="#b8a880" letter-spacing="4" font-weight="400">GOLDEN GOAT MILK SOAK</text>

      <!-- NOTES -->
      <text x="240" y="236" text-anchor="middle" font-family="Cinzel, serif" font-size="9" fill="rgba(196,154,60,0.75)" letter-spacing="2">VANILLA / BERGAMOT / JASMINE / CEDAR</text>

      <!-- SIZE -->
      <text x="240" y="260" text-anchor="middle" font-family="Cinzel, serif" font-size="9" fill="rgba(140,120,80,0.7)" letter-spacing="3">8 OZ | 227 G</text>
    </svg>
  </div>

  <!-- LABEL C: Pale Stone -->
  <div class="card">
    <div class="card-label" style="color:rgba(100,90,70,0.7);">C · PALE STONE</div>
    <svg width="480" height="288" viewBox="0 0 480 288" xmlns="http://www.w3.org/2000/svg">
      <!-- Background -->
      <rect width="480" height="288" fill="#f2ede3" rx="3"/>
      <!-- Border -->
      <rect x="1" y="1" width="478" height="286" fill="none" stroke="rgba(50,40,30,0.2)" stroke-width="1" rx="2"/>

      <!-- CRISOFI -->
      <text x="240" y="60" text-anchor="middle" font-family="Cinzel, serif" font-size="13" fill="#6a5f48" letter-spacing="8">CRISOFI</text>

      <!-- ORO -->
      <text x="240" y="168" text-anchor="middle" font-family="Cormorant Garant, serif" font-size="110" font-weight="300" fill="#2a2218">ORO</text>

      <!-- Rule -->
      <line x1="216" y1="186" x2="264" y2="186" stroke="rgba(180,140,60,0.7)" stroke-width="1"/>

      <!-- GOLDEN GOAT MILK SOAK -->
      <text x="240" y="214" text-anchor="middle" font-family="Cinzel, serif" font-size="10" fill="#4a4235" letter-spacing="4">GOLDEN GOAT MILK SOAK</text>

      <!-- NOTES (italic) -->
      <text x="240" y="238" text-anchor="middle" font-family="Cormorant Garant, serif" font-size="13" fill="#8a7a60" letter-spacing="1" font-style="italic">Vanilla · Bergamot · Jasmine · Cedar</text>

      <!-- SIZE -->
      <text x="240" y="260" text-anchor="middle" font-family="Cinzel, serif" font-size="9" fill="#aaa090" letter-spacing="3">8 OZ | 227 G</text>
    </svg>
  </div>

</div>
</body>
</html>
